extends: default
font:
  catalog:
    merge: true
    IPAex: fonts-japanese-gothic.ttf
  fallbacks:
  - Noto Serif
base:
  text-align: left
  font-family: IPAex
codespan:
  font-family: IPAex
kbd:
  font-family: $codespan-font-family
code:
  font-family: $codespan-font-family
caption:
  align: center
title-page:
  text-align: center
  title:
    top: 30%
    font-color: 000000
  authors:
    margin-top: $base_font_size * 30
    font-color: 000000
  revision:
    delimiter: '<br/>'
    margin-top: $base_font_size * 1.25
    font-color: 000000
toc:
  dot-leader:
    content: ' '
header:
  border-color: DDDDDD
  border-width: 0.25
  height: $base_line_height_length * 2.5
  line-height: 1
  padding: [0, 1, $base_line_height_length / 2, 1]
  vertical_align: bottom
  verso:
    left:
      content: '{chapter-title}'
    right:
      content: '{section-title}'
  recto:
    left:
      content: '{chapter-title}'
    right:
      content: '{section-title}'
footer:
  verso:
    left:
      content: '{document-title} v{revnumber}'
    right:
      content: '{page-number}'
  recto:
    left:
      content: '{document-title} v{revnumber}'
    right:
      content: '{page-number}'
